[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "nft"

# Scanner API
[[redirects]]
  from = "/api/crypto-scanner"
  to = "/.netlify/functions/crypto-scanner"
  status = 200

# Analytics API
[[redirects]]
  from = "/api/analytics"
  to = "/.netlify/functions/analytics"
  status = 200

# Bot status and run
[[redirects]]
  from = "/api/trading-bot/*"
  to = "/.netlify/functions/trading-bot"
  status = 200
  query = {path = ":path"}

# Bot status endpoint (dedicated function for status/health data)
[[redirects]]
  from = "/api/bot-status"
  to = "/.netlify/functions/bot-status"
  status = 200
  force = true

# Also route /api/trading-bot/status to the bot-status function
[[redirects]]
  from = "/api/trading-bot/status"
  to = "/.netlify/functions/bot-status"
  status = 200
  force = true

# Health check endpoint (lightweight, for monitoring)
[[redirects]]
  from = "/api/health"
  to = "/.netlify/functions/health"
  status = 200
  force = true

# Live prices endpoint (lightweight, for ticker polling)
[[redirects]]
  from = "/api/live-prices"
  to = "/.netlify/functions/live-prices"
  status = 200
  force = true

# Alpaca proxy (account, positions, orders, activities, data)
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/alpaca-proxy/:splat"
  status = 200

# SPA fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Scheduled function - runs every 5 minutes (no custom path allowed with schedule)
[functions."trading-bot-cron"]
  schedule = "*/5 * * * *"

# trading-bot is invoked via HTTP redirect above (line 13-17)
# No [functions."trading-bot"] config needed — path would conflict with Netlify rules
# and the redirect rule already routes /api/trading-bot/* → /.netlify/functions/trading-bot